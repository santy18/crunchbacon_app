<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrunchBacon | Stop Recording. Start Crunching.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bacon: {
                pink: '#FF1E56',
                orange: '#FFAC41',
                bg: '#0A0A0A',
                card: '#1A1A1A',
                border: '#2A2A2A',
                input: '#141414',
                dark: '#111111',
                panel: '#1a1a2e',
              },
              success: { DEFAULT: '#2ea043', hover: '#278a38' },
              danger: { DEFAULT: '#d33', hover: '#b22' },
              warn: { DEFAULT: '#c47a20', hover: '#a86618' },
            },
            fontFamily: {
              heading: ['Outfit', 'sans-serif'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      @keyframes af-bar {
        0%, 100% { height: 4px; }
        50% { height: 14px; }
      }
      .af-playing-bars span {
        animation: af-bar 0.8s ease-in-out infinite;
      }
      .af-playing-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
      .af-playing-bars span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
      .af-playing-bars span:nth-child(3) { height: 6px; animation-delay: 0.3s; }
    </style>
  </head>
  <body class="bg-bacon-bg text-white font-sans m-0 min-w-[320px] min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
